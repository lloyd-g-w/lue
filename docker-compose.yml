services:
  server:
    build:
      context: .
      target: server-runtime
    environment:
      SERVER_ADDR: ${SERVER_ADDR:-0.0.0.0:3000}
      DATA_PATH: ${DATA_PATH:-/data/store.json}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
      MICROSOFT_TENANT_ID: ${MICROSOFT_TENANT_ID:-}
      SERVER_PUBLIC_BASE_URL: ${SERVER_PUBLIC_BASE_URL:-http://127.0.0.1:8081}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://127.0.0.1:8081}
    volumes:
      - lue-data:/data
    restart: unless-stopped
  web:
    build:
      context: .
      target: web-runtime
    depends_on:
      - server
    ports:
      - ${WEB_PORT:-8081}:80
    restart: unless-stopped
volumes:
  lue-data:
